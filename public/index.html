<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Task Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --paper: #FBFAF6;
    --panel: #FFFFFF;
    --ink: #1C1B22;
    --muted: #6B6A74;
    --line: #E9E6DE;
    --line-strong: #D9D5CB;
    --accent: #136F63;
    --accent-soft: #DCEEE9;
    /* urgency tiers */
    --over: #C2410C;
    --soon: #B45309;
    --ok: #2F7A43;
    --none: #9A98A2;
    --shadow: 0 1px 2px rgba(28,27,34,.04), 0 8px 24px rgba(28,27,34,.05);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 96px; }

  /* ---- header ---- */
  header { margin-bottom: 22px; }
  .eyebrow {
    font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted); font-weight: 600; margin: 0 0 6px;
  }
  h1 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800; font-size: clamp(30px, 6vw, 44px);
    letter-spacing: -.02em; margin: 0; line-height: 1.02;
  }
  .summary { color: var(--muted); font-size: 14px; margin-top: 8px; }
  .summary b { color: var(--ink); font-weight: 600; }
  .summary .over-count { color: var(--over); }

  /* ---- tabs ---- */
  .tabs { display: inline-flex; gap: 4px; background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 3px; margin: 4px 0 18px; }
  .tabs button {
    border: 0; background: transparent; cursor: pointer; font: inherit; font-size: 13.5px; font-weight: 500;
    color: var(--muted); padding: 8px 18px; border-radius: 999px; transition: .15s;
  }
  .tabs button[aria-pressed="true"] { background: var(--ink); color: #fff; }

  /* ---- dashboard ---- */
  .dash-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 11px; margin-bottom: 22px; }
  @media (max-width: 560px) { .dash-stats { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 15px 16px; box-shadow: var(--shadow); }
  .stat-num { font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 30px; line-height: 1; letter-spacing: -.02em; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 6px; font-weight: 500; }
  .stat.over .stat-num { color: var(--over); }
  .stat.soon .stat-num { color: var(--soon); }
  .stat.ok .stat-num { color: var(--ok); }
  .dash-note { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 11px 15px; margin: -10px 0 22px; font-size: 13.5px; color: var(--muted); box-shadow: var(--shadow); }
  .dash-note b { color: var(--ink); font-weight: 600; }
  .dash-note .n-over b { color: var(--over); }
  .dash-note .n-soon b { color: var(--soon); }

  .dash-section { margin-bottom: 22px; }
  .dash-h { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600; color: var(--muted); margin: 0 4px 10px; }
  .dash-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 6px 16px; box-shadow: var(--shadow); }
  .dash-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 620px) { .dash-cols { grid-template-columns: 1fr; gap: 0; } }

  /* donut charts */
  .pie-wrap { display: flex; align-items: center; gap: 18px; padding: 8px 0; flex-wrap: wrap; }
  .pie { position: relative; width: 132px; height: 132px; border-radius: 50%; flex: 0 0 auto; }
  .pie-hole { position: absolute; inset: 24%; background: var(--panel); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .pie-total { font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 24px; line-height: 1; }
  .pie-cap { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
  .legend { display: flex; flex-direction: column; gap: 7px; flex: 1; min-width: 130px; }
  .lg-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink); }
  .lg-dot { width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto; }
  .lg-item b { margin-left: auto; font-weight: 600; }
  .pie-empty { color: var(--muted); font-size: 13px; padding: 30px 2px; text-align: center; width: 100%; }

  /* vertical bar (column) chart */
  .col-chart { display: flex; align-items: flex-end; gap: 14px; padding: 8px 2px 0; overflow-x: auto; }
  .col-item { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 54px; flex: 1 0 54px; }
  .col-val { font-size: 12px; font-weight: 600; color: var(--ink); }
  .col-track { width: 30px; height: 120px; background: var(--paper); border-radius: 6px; display: flex; align-items: flex-end; overflow: hidden; }
  .col-fill { width: 100%; background: var(--ok); border-radius: 6px 6px 0 0; transition: height .3s; min-height: 3px; }
  .col-name { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.25; max-width: 64px; }
  .col-frac { font-size: 10px; color: var(--none); }
  .dash-empty { color: var(--muted); font-size: 13px; padding: 14px 2px; }

  /* ---- toolbar ---- */
  .toolbar {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    margin: 22px 0 14px;
  }
  .seg { display: inline-flex; background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 3px; }
  .seg button {
    border: 0; background: transparent; cursor: pointer;
    font: inherit; font-size: 13px; font-weight: 500; color: var(--muted);
    padding: 6px 13px; border-radius: 999px; transition: .15s;
  }
  .seg button[aria-pressed="true"] { background: var(--ink); color: #fff; }
  .toggle-pill {
    border: 1px solid var(--line); background: var(--panel); cursor: pointer;
    font: inherit; font-size: 13px; font-weight: 500; color: var(--muted);
    padding: 7px 13px; border-radius: 999px; display: inline-flex; align-items: center; gap: 7px; transition: .15s;
  }
  .toggle-pill svg { width: 14px; height: 14px; }
  .toggle-pill[aria-pressed="true"] { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .spacer { flex: 1; }
  .add-btn {
    border: 0; cursor: pointer; font: inherit; font-weight: 600; font-size: 14px;
    background: var(--accent); color: #fff; padding: 10px 16px; border-radius: 10px;
    display: inline-flex; align-items: center; gap: 7px; transition: .15s; box-shadow: var(--shadow);
  }
  .add-btn:hover { filter: brightness(1.07); }
  .add-btn svg { width: 16px; height: 16px; }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
  .chip {
    border: 1px solid var(--line); background: var(--panel); cursor: pointer;
    font: inherit; font-size: 12.5px; color: var(--muted); padding: 5px 11px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px; transition: .15s;
  }
  .chip[aria-pressed="true"] { border-color: var(--ink); color: var(--ink); font-weight: 600; }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ---- group heading ---- */
  .group-head {
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    color: var(--muted); margin: 24px 4px 10px; display: flex; align-items: center; gap: 8px;
  }
  .group-head::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .you-pill {
    font-size: 9px; font-weight: 700; letter-spacing: .08em; color: var(--accent);
    background: var(--accent-soft); padding: 2px 6px; border-radius: 999px; margin-left: 2px;
  }

  /* ---- task card ---- */
  .task {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 16px 14px 20px; margin-bottom: 9px;
    display: flex; align-items: flex-start; gap: 13px; box-shadow: var(--shadow);
    transition: .15s;
  }
  .task::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 12px 0 0 12px; background: var(--rail, var(--none));
  }
  .task.done { opacity: .55; }
  .task.done .t-title { text-decoration: line-through; }

  .check {
    flex: 0 0 auto; width: 21px; height: 21px; margin-top: 1px; border-radius: 6px;
    border: 1.8px solid var(--line-strong); background: #fff; cursor: pointer;
    display: grid; place-items: center; transition: .15s; padding: 0;
  }
  .check:hover { border-color: var(--accent); }
  .task.done .check { background: var(--accent); border-color: var(--accent); }
  .check svg { width: 13px; height: 13px; stroke: #fff; opacity: 0; }
  .task.done .check svg { opacity: 1; }

  .t-main { flex: 1; min-width: 0; }
  .t-title { font-weight: 600; font-size: 15px; word-break: break-word; }
  .t-meta { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 6px; font-size: 12.5px; color: var(--muted); align-items: center; }
  .t-notes {
    margin-top: 8px; font-size: 13px; color: var(--muted); line-height: 1.5;
    white-space: pre-wrap; word-break: break-word; padding-top: 8px; border-top: 1px dashed var(--line);
  }
  .who { display: inline-flex; align-items: center; gap: 6px; color: var(--ink); font-weight: 500; }
  .avatar {
    width: 19px; height: 19px; border-radius: 50%; display: grid; place-items: center;
    font-size: 10px; font-weight: 700; color: #fff; flex: 0 0 auto;
  }
  .due { display: inline-flex; align-items: center; gap: 5px; font-weight: 500; }
  .due svg { width: 12px; height: 12px; }
  .cls-tag {
    display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600;
    color: var(--ink); background: var(--paper); border: 1px solid var(--line-strong);
    padding: 2px 8px; border-radius: 6px;
  }
  .cls-tag svg { width: 11px; height: 11px; color: var(--muted); }
  .added { font-size: 12px; color: var(--none); }
  .doneat { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 500; color: var(--ok); }
  .doneat svg { width: 12px; height: 12px; }
  .proj-tag {
    display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600;
    color: var(--accent); background: var(--accent-soft); padding: 2px 8px; border-radius: 6px;
  }
  .proj-tag svg { width: 11px; height: 11px; }

  .t-actions { display: flex; gap: 2px; flex: 0 0 auto; }
  .icon-btn {
    border: 0; background: transparent; cursor: pointer; color: var(--none);
    width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center; transition: .15s;
  }
  .icon-btn:hover { background: var(--paper); color: var(--ink); }
  .icon-btn.del:hover { color: var(--over); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ---- empty ---- */
  .empty { text-align: center; padding: 70px 20px; color: var(--muted); }
  .empty .big { font-family: "Bricolage Grotesque", sans-serif; font-size: 20px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }

  /* ---- modal ---- */
  .scrim {
    position: fixed; inset: 0; background: rgba(28,27,34,.32); backdrop-filter: blur(2px);
    display: none; align-items: flex-end; justify-content: center; padding: 0; z-index: 50;
  }
  .scrim.open { display: flex; }
  .modal {
    background: var(--panel); width: 100%; max-width: 480px; border-radius: 18px 18px 0 0;
    padding: 22px 22px 26px; box-shadow: 0 -8px 40px rgba(28,27,34,.18);
    animation: rise .22s ease;
  }
  @keyframes rise { from { transform: translateY(24px); opacity: .6; } to { transform: none; opacity: 1; } }
  @media (min-width: 560px) {
    .scrim { align-items: center; padding: 20px; }
    .modal { border-radius: 18px; animation: pop .18s ease; }
    @keyframes pop { from { transform: scale(.97); opacity: .5; } to { transform: none; opacity: 1; } }
  }
  .modal h2 { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: 21px; margin: 0 0 16px; letter-spacing: -.01em; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: .02em; }
  .field input, .field select, .field textarea {
    width: 100%; font: inherit; font-size: 14.5px; color: var(--ink);
    border: 1px solid var(--line-strong); border-radius: 9px; padding: 10px 12px; background: var(--paper);
    transition: .15s;
  }
  .field textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
  .chips-select { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip-opt {
    font: inherit; font-size: 12.5px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--line-strong); background: var(--paper); color: var(--muted);
    padding: 6px 11px; border-radius: 999px; transition: .12s;
  }
  .chip-opt:hover { border-color: var(--accent); color: var(--ink); }
  .chip-opt.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-soft); }
  .row2 { display: flex; gap: 11px; }
  .row2 .field { flex: 1; }
  .modal-actions { display: flex; gap: 9px; margin-top: 8px; }
  .modal-actions button { flex: 1; font: inherit; font-weight: 600; font-size: 14px; padding: 11px; border-radius: 10px; cursor: pointer; transition: .15s; }
  .btn-ghost { background: var(--paper); border: 1px solid var(--line-strong); color: var(--ink); }
  .btn-ghost:hover { background: #fff; }
  .btn-primary { background: var(--accent); border: 0; color: #fff; }
  .btn-primary:hover { filter: brightness(1.07); }

  .head-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .signout {
    display: inline-flex; align-items: center; gap: 7px; flex: 0 0 auto; margin-top: 4px;
    border: 1px solid var(--line); background: var(--panel); cursor: pointer;
    font: inherit; font-size: 13px; font-weight: 500; color: var(--muted);
    padding: 7px 12px; border-radius: 999px; transition: .15s;
  }
  .signout:hover { color: var(--ink); border-color: var(--line-strong); }
  .signout[hidden] { display: none; }
  .signout svg { width: 15px; height: 15px; }

  .auth-scrim {
    position: fixed; inset: 0; background: var(--paper); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .auth-scrim[hidden] { display: none; }
  .auth-card {
    background: var(--panel); border: 1px solid var(--line); box-shadow: var(--shadow);
    border-radius: 16px; padding: 28px 26px; width: 100%; max-width: 360px;
  }
  .auth-card .eyebrow { margin-bottom: 2px; }

  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>

<div class="wrap">
  <header>
    <div class="head-row">
      <div>
        <p class="eyebrow">Control &amp; Automation</p>
        <h1>Task Desk</h1>
        <p class="summary" id="summary">Loading…</p>
      </div>
      <button class="signout" id="signoutBtn" hidden>
        <span id="whoami"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </button>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <button data-view="tasks" aria-pressed="true">Tasks</button>
    <button data-view="dashboard" aria-pressed="false">Dashboard</button>
  </div>

  <div id="tasksView">
  <div class="toolbar">
    <div class="seg" id="sortSeg">
      <button data-sort="due" aria-pressed="false">By deadline</button>
      <button data-sort="person" aria-pressed="true">By person</button>
      <button data-sort="class" aria-pressed="false">By class</button>
      <button data-sort="project" aria-pressed="false">By project</button>
      <button data-sort="added" aria-pressed="false">Newest</button>
    </div>
    <button class="toggle-pill" id="weekToggle" aria-pressed="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Due this week
    </button>
    <button class="toggle-pill" id="archiveToggle" aria-pressed="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8M10 12h4"/></svg>
      Archive
    </button>
    <button class="toggle-pill" id="doneToggle" aria-pressed="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      <span id="doneToggleLabel">Hide done</span>
    </button>
    <div class="spacer"></div>
    <button class="add-btn" id="openAdd">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Add task
    </button>
  </div>

  <div class="filter-row" id="filterRow"></div>

  <div id="list"><div class="loading">Loading your tasks…</div></div>
  </div>

  <div id="dashboard" hidden></div>
</div>

<!-- modal -->
<div class="scrim" id="scrim">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h2 id="modalTitle">Add task</h2>
    <div class="field">
      <label for="f-title">What needs doing</label>
      <input id="f-title" placeholder="e.g. Send the contract draft" autocomplete="off" />
    </div>
    <div class="field">
      <label for="f-who">Assigned to</label>
      <select id="f-who">
        <option value="">Unassigned</option>
        <option>Froy</option>
        <option>Miguel</option>
        <option>Ben</option>
        <option>Angel B</option>
        <option>Javier</option>
        <option>Tono</option>
        <option>Alejandra</option>
        <option>Lucia</option>
        <option>Gil</option>
        <option>Paco</option>
        <option>Angel G</option>
        <option>Marcelo</option>
        <option>Franco</option>
        <option>Aaron</option>
        <option>Jack</option>
        <option>Clay</option>
      </select>
    </div>
    <div class="field">
      <label>Class <span style="font-weight:400;text-transform:none;letter-spacing:0">(select any that apply)</span></label>
      <div id="f-class" class="chips-select">
        <button type="button" class="chip-opt" data-val="PLC Prog">PLC Prog</button>
        <button type="button" class="chip-opt" data-val="Computer Prog">Computer Prog</button>
        <button type="button" class="chip-opt" data-val="HMI / SCADA">HMI / SCADA</button>
        <button type="button" class="chip-opt" data-val="Schematics / Panels">Schematics / Panels</button>
        <button type="button" class="chip-opt" data-val="BOMs / Parts">BOMs / Parts</button>
        <button type="button" class="chip-opt" data-val="Networking">Networking</button>
        <button type="button" class="chip-opt" data-val="Routing">Routing</button>
        <button type="button" class="chip-opt" data-val="Testing and Troubleshooting">Testing and Troubleshooting</button>
        <button type="button" class="chip-opt" data-val="Manuals">Manuals</button>
        <button type="button" class="chip-opt" data-val="Retrofits">Retrofits</button>
        <button type="button" class="chip-opt" data-val="Service">Service</button>
        <button type="button" class="chip-opt" data-val="Prototype">Prototype</button>
      </div>
    </div>
    <div class="field">
      <label for="f-project">Project <span style="font-weight:400;text-transform:none;letter-spacing:0">(pick one or type a new one)</span></label>
      <input id="f-project" list="projects" placeholder="e.g. Line 3 Upgrade" />
      <datalist id="projects"></datalist>
    </div>
    <div class="field">
      <label for="f-due">Deadline</label>
      <input id="f-due" type="date" />
    </div>
    <div class="field">
      <label for="f-notes">Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <textarea id="f-notes" placeholder="Context, links, sub-steps…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn-primary" id="saveBtn">Add task</button>
    </div>
  </div>
</div>

<div class="auth-scrim" id="authScrim" hidden>
  <div class="auth-card">
    <p class="eyebrow">Control &amp; Automation</p>
    <h1 style="font-size:25px; letter-spacing:-.02em; margin:2px 0 4px;">Task Desk</h1>
    <p style="color:var(--muted); font-size:13px; margin:0 0 20px;">Sign in to continue</p>
    <div class="field">
      <label for="login-user">User</label>
      <select id="login-user">
        <option value="">Choose…</option>
        <option value="froy">Froy</option>
        <option value="miguel">Miguel</option>
        <option value="gil">Gil</option>
      </select>
    </div>
    <div class="field">
      <label for="login-pass">Password</label>
      <input id="login-pass" type="password" autocomplete="current-password" />
    </div>
    <div id="login-error" style="color:var(--over); font-size:13px; min-height:18px; margin-bottom:4px;"></div>
    <button class="btn-primary" id="login-btn" style="width:100%; padding:12px; border:0; border-radius:10px; font-weight:600; font-size:14px; cursor:pointer;">Sign in</button>
  </div>
</div>

<script>
const API = "/api/tasks";
let ME = "";   // set to the signed-in user's name; sorts first, new tasks default to you
let tasks = [];
let sortMode = "person";
let personFilter = null;
let weekOnly = false;
let archiveView = false;
let hideDone = false;
let view = "tasks";   // "tasks" | "dashboard"
let editingId = null;

const PALETTE = ["#136F63","#B45309","#7C3AED","#C2410C","#0E7490","#9D174D","#4D7C0F","#1D4ED8","#92400E","#0F766E"];

const $ = s => document.querySelector(s);
const list = $("#list");

/* ---------- data layer (talks to the server / MongoDB) ---------- */
async function load() {
  list.innerHTML = `<div class="loading">Loading your tasks…</div>`;
  try {
    const r = await fetch(API);
    if (r.status === 401) { showLogin(); return; }
    if (!r.ok) throw new Error("bad response");
    tasks = await r.json();
  } catch (e) {
    list.innerHTML = `<div class="empty"><div class="big">Can't reach the server</div>Make sure the app is running, then refresh this page.</div>`;
    return;
  }
  render();
}

async function apiCreate(data) {
  const r = await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
  if (!r.ok) throw new Error("create failed");
  return r.json();
}
async function apiUpdate(id, data) {
  const r = await fetch(`${API}/${id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
  if (!r.ok) throw new Error("update failed");
  return r.json();
}
async function apiDelete(id) {
  const r = await fetch(`${API}/${id}`, { method: "DELETE" });
  if (!r.ok) throw new Error("delete failed");
}

/* ---------- helpers ---------- */
const todayStr = () => new Date().toISOString().slice(0,10);
const ARCHIVE_DAYS = 14;
const NO_PROJECT = "\u0000none";
const projKey = (t) => t.project || NO_PROJECT;
// A whole project archives only once ALL its tasks are done AND the most
// recent completion was more than ARCHIVE_DAYS ago. Returns the archived keys.
function archivedProjectKeys() {
  const groups = {};
  tasks.forEach(t => { (groups[projKey(t)] ||= []).push(t); });
  const cutoff = Date.now() - ARCHIVE_DAYS * 86400000;
  const archived = new Set();
  for (const k in groups) {
    const g = groups[k];
    if (!g.every(t => t.done)) continue;
    const last = Math.max(...g.map(t => t.completedAt || 0));
    if (last && last < cutoff) archived.add(k);
  }
  return archived;
}
function dayDiff(due) {
  if (!due) return null;
  const a = new Date(due + "T00:00:00"); const b = new Date(todayStr() + "T00:00:00");
  return Math.round((a - b) / 86400000);
}
function dueLabel(due) {
  const d = dayDiff(due);
  if (d === null) return "No deadline";
  if (d < -1) return `Overdue ${-d} days`;
  if (d === -1) return "Overdue 1 day";
  if (d === 0) return "Due today";
  if (d === 1) return "Due tomorrow";
  if (d <= 7) return `Due in ${d} days`;
  const dt = new Date(due + "T00:00:00");
  return "Due " + dt.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function addedLabel(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  if (isNaN(d)) return "";
  return "Added " + d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function doneLabel(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  if (isNaN(d)) return "";
  return "Done " + d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function urgency(t) {
  if (t.done) return "var(--ok)";
  const d = dayDiff(t.due);
  if (d === null) return "var(--none)";
  if (d < 0) return "var(--over)";
  if (d <= 2) return "var(--soon)";
  return "var(--ok)";
}
function colorFor(name) {
  if (!name) return "var(--none)";
  let h = 0; for (let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) >>> 0;
  return PALETTE[h % PALETTE.length];
}
const initials = n => !n ? "?" : n.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();
const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
// classes can be a list (or a legacy single string) — always work with an array
const asClasses = (cls) => Array.isArray(cls) ? cls : (cls ? [cls] : []);
const getSelectedClasses = () => [...document.querySelectorAll('#f-class .chip-opt.on')].map(b => b.dataset.val);
function setSelectedClasses(arr) {
  const set = new Set(arr || []);
  document.querySelectorAll('#f-class .chip-opt').forEach(b => b.classList.toggle('on', set.has(b.dataset.val)));
}

/* ---------- render ---------- */
function render() {
  if (view === "dashboard") renderDashboard();
  const archKeys = archivedProjectKeys();
  const isArch = t => archKeys.has(projKey(t));
  const active = tasks.filter(t => !isArch(t));
  const archivedTasks = tasks.filter(isArch);

  const sum = $("#summary");
  if (archiveView) {
    sum.innerHTML = `<b>${archKeys.size}</b> archived ${archKeys.size===1?"project":"projects"} · ${archivedTasks.length} ${archivedTasks.length===1?"task":"tasks"}`;
  } else if (tasks.length === 0) {
    sum.textContent = "No tasks yet — add the first one to start tracking.";
  } else {
    const open = active.filter(t=>!t.done);
    const overdue = open.filter(t=>dayDiff(t.due)!==null && dayDiff(t.due)<0).length;
    sum.innerHTML = `<b>${open.length}</b> open · <b>${active.length-open.length}</b> done` +
      (overdue ? ` · <span class="over-count"><b>${overdue}</b> overdue</span>` : "") +
      (archivedTasks.length ? ` · <span style="color:var(--none)">${archivedTasks.length} archived</span>` : "");
  }

  // people who currently have tasks → filter chips
  const people = [...new Set(tasks.map(t=>t.who).filter(Boolean))].sort();
  // previously used projects (excluding archived ones) → autocomplete suggestions
  const projects = [...new Set(tasks.map(t=>t.project).filter(Boolean))]
    .filter(p => !archKeys.has(p))
    .sort();
  $("#projects").innerHTML = projects.map(p=>`<option value="${esc(p)}">`).join("");
  const fr = $("#filterRow");
  if (people.length && !archiveView) {
    fr.innerHTML = `<button class="chip" data-person="" aria-pressed="${personFilter===null}">Everyone</button>` +
      people.map(p=>`<button class="chip" data-person="${esc(p)}" aria-pressed="${personFilter===p}">
        <span class="dot" style="background:${colorFor(p)}"></span>${esc(p)}</button>`).join("");
  } else fr.innerHTML = "";

  // ---- archive view: grouped by project, most recently finished first ----
  if (archiveView) {
    let arch = personFilter ? archivedTasks.filter(t=>t.who===personFilter) : archivedTasks;
    if (arch.length === 0) {
      list.innerHTML = `<div class="empty"><div class="big">Archive is empty</div>A whole project moves here automatically once all its tasks are done and ${ARCHIVE_DAYS} days have passed.</div>`;
      return;
    }
    const groups = {};
    arch.forEach(t => { const k = t.project || "No project"; (groups[k] ||= []).push(t); });
    const lastDone = g => Math.max(...g.map(t => t.completedAt || 0));
    const order = Object.keys(groups).sort((a,b)=> lastDone(groups[b]) - lastDone(groups[a]));
    list.innerHTML = order.map(k =>
      `<div class="group-head">${esc(k)}</div>` +
      groups[k].slice().sort((a,b)=>(b.completedAt||0)-(a.completedAt||0)).map(card).join("")
    ).join("");
    return;
  }

  // ---- normal views: archived tasks are hidden ----
  let shown = personFilter ? active.filter(t=>t.who===personFilter) : active.slice();
  if (hideDone) shown = shown.filter(t => !t.done);

  if (weekOnly) {
    shown = shown.filter(t => {
      if (t.done) return false;
      const d = dayDiff(t.due);
      return d !== null && d <= 7;   // overdue through 7 days out
    });
  }

  if (shown.length === 0) {
    const msg = weekOnly ? "Nothing due in the next 7 days."
      : hideDone ? "Done tasks are hidden — nothing open right now."
      : (tasks.length ? "No tasks match this filter." : "Add a task and assign it to someone.");
    list.innerHTML = `<div class="empty"><div class="big">${tasks.length? "Nothing here":"A clear desk"}</div>${msg}</div>`;
    return;
  }

  if (sortMode === "person") {
    const groups = {};
    shown.forEach(t => { const k = t.who || "Unassigned"; (groups[k] ||= []).push(t); });
    list.innerHTML = Object.keys(groups).sort((a,b)=> {
        if (a===ME) return -1; if (b===ME) return 1;
        if (a==="Unassigned") return 1; if (b==="Unassigned") return -1;
        return a.localeCompare(b);
      })
      .map(k => `<div class="group-head"><span class="dot" style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${colorFor(k==="Unassigned"?"":k)}"></span>${esc(k)}${k===ME?` <span class="you-pill">you</span>`:""}</div>` +
        sortDue(groups[k]).map(card).join("")).join("");
  } else if (sortMode === "class") {
    const groups = {};
    shown.forEach(t => {
      const cs = asClasses(t.cls);
      if (cs.length === 0) (groups["No class"] ||= []).push(t);
      else cs.forEach(c => (groups[c] ||= []).push(t));
    });
    list.innerHTML = Object.keys(groups).sort((a,b)=> a==="No class"?1:b==="No class"?-1:a.localeCompare(b))
      .map(k => `<div class="group-head">${esc(k)}</div>` +
        sortDue(groups[k]).map(card).join("")).join("");
  } else if (sortMode === "project") {
    const groups = {};
    shown.forEach(t => { const k = t.project || "No project"; (groups[k] ||= []).push(t); });
    const allDone = k => groups[k].every(t => t.done);
    list.innerHTML = Object.keys(groups).sort((a,b)=> {
        if (a==="No project") return 1;            // loose tasks always last
        if (b==="No project") return -1;
        const ad = allDone(a), bd = allDone(b);
        if (ad !== bd) return ad ? 1 : -1;          // finished projects sink below active ones
        return a.localeCompare(b);
      })
      .map(k => `<div class="group-head">${esc(k)}</div>` +
        sortDue(groups[k]).map(card).join("")).join("");
  } else if (sortMode === "added") {
    list.innerHTML = shown.slice().reverse().map(card).join("");
  } else {
    list.innerHTML = sortDue(shown).map(card).join("");
  }
}

function sortDue(arr) {
  return arr.slice().sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const da = a.due ? dayDiff(a.due) : Infinity, db = b.due ? dayDiff(b.due) : Infinity;
    return da - db;
  });
}

/* ---------- dashboard ---------- */
function donut(segments, totalLabel) {
  const total = segments.reduce((s,x)=>s+x.value, 0);
  if (total === 0) return `<div class="pie-empty">No data yet.</div>`;
  let acc = 0;
  const stops = segments.filter(s=>s.value>0).map(s => {
    const start = acc/total*100; acc += s.value; const end = acc/total*100;
    return `${s.color} ${start}% ${end}%`;
  }).join(", ");
  const legend = segments.filter(s=>s.value>0).map(s =>
    `<div class="lg-item"><span class="lg-dot" style="background:${s.color}"></span>${esc(s.label)}<b>${s.value}</b></div>`).join("");
  return `<div class="pie-wrap">
    <div class="pie" style="background:conic-gradient(${stops})"><div class="pie-hole"><span class="pie-total">${total}</span><span class="pie-cap">${totalLabel}</span></div></div>
    <div class="legend">${legend}</div>
  </div>`;
}

function renderDashboard() {
  const dash = $("#dashboard");
  const archKeys = archivedProjectKeys();
  const active = tasks.filter(t => !archKeys.has(projKey(t)));
  const openTasks = active.filter(t => !t.done);
  const isOverdue = t => { const d = dayDiff(t.due); return d !== null && d < 0; };
  const isWeek = t => { const d = dayDiff(t.due); return d !== null && d >= 0 && d <= 7; };
  const overdue = openTasks.filter(isOverdue);
  const dueWeek = openTasks.filter(isWeek);
  const openLater = openTasks.filter(t => !isOverdue(t) && !isWeek(t));
  const month = Date.now() - 30 * 86400000;
  const done30 = active.filter(t => t.done && t.completedAt && t.completedAt >= month);

  // headline numbers
  const stats = `
    <div class="dash-stats">
      <div class="stat"><div class="stat-num">${openTasks.length}</div><div class="stat-label">Open</div></div>
      <div class="stat over"><div class="stat-num">${overdue.length}</div><div class="stat-label">Overdue</div></div>
      <div class="stat soon"><div class="stat-num">${dueWeek.length}</div><div class="stat-label">Due this week</div></div>
      <div class="stat ok"><div class="stat-num">${done30.length}</div><div class="stat-label">Done · 30 days</div></div>
    </div>`;

  // percentage breakdown of open work
  const pct = n => openTasks.length ? Math.round(n / openTasks.length * 100) : 0;
  const note = openTasks.length ? `
    <div class="dash-note">Of <b>${openTasks.length}</b> open: <span class="n-over"><b>${pct(overdue.length)}%</b> overdue</span> · <span class="n-soon"><b>${pct(dueWeek.length)}%</b> due this week</span> · <b>${pct(openLater.length)}%</b> later</div>` : "";

  // status donut (mutually exclusive slices)
  const statusPie = donut([
    { label: "Overdue", value: overdue.length, color: "#C2410C" },
    { label: "Due this week", value: dueWeek.length, color: "#B45309" },
    { label: "Open · later", value: openLater.length, color: "#0E7490" },
    { label: "Done", value: active.filter(t=>t.done).length, color: "#2F7A43" },
  ], "tasks");

  // person load donut (share of open tasks)
  const byPerson = {};
  openTasks.forEach(t => { const k = t.who || "Unassigned"; byPerson[k] = (byPerson[k]||0) + 1; });
  const personSegs = Object.entries(byPerson)
    .sort((a,b)=> b[1]-a[1])
    .map(([name, v]) => ({ label: name, value: v, color: name==="Unassigned" ? "var(--none)" : colorFor(name) }));
  const personPie = donut(personSegs, "open");

  const pies = `
    <div class="dash-cols">
      <div class="dash-section"><div class="dash-h">Task status</div><div class="dash-card">${statusPie}</div></div>
      <div class="dash-section"><div class="dash-h">Person load (open tasks)</div><div class="dash-card">${personPie}</div></div>
    </div>`;

  // progress by project — vertical bars
  const byProj = {};
  active.forEach(t => { const p = t.project; if (!p) return; (byProj[p] ||= {done:0, total:0}); byProj[p].total++; if (t.done) byProj[p].done++; });
  const projRows = Object.entries(byProj).sort((a,b)=> (a[1].done/a[1].total) - (b[1].done/b[1].total));
  const projects = projRows.length ? `
    <div class="dash-section">
      <div class="dash-h">Progress by project</div>
      <div class="dash-card">
        <div class="col-chart">
          ${projRows.map(([name, s]) => { const pct = Math.round(s.done/s.total*100); return `
            <div class="col-item">
              <div class="col-val">${pct}%</div>
              <div class="col-track"><div class="col-fill" style="height:${pct}%"></div></div>
              <div class="col-frac">${s.done}/${s.total}</div>
              <div class="col-name">${esc(name)}</div>
            </div>`; }).join("")}
        </div>
      </div>
    </div>` : "";

  dash.innerHTML = stats + note + pies + projects;
}

function card(t) {
  const who = t.who ? `<span class="who"><span class="avatar" style="background:${colorFor(t.who)}">${initials(t.who)}</span>${esc(t.who)}</span>` : "";
  const cal = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`;
  const due = `<span class="due" style="color:${urgency(t)}">${cal}${dueLabel(t.due)}</span>`;
  const clsTag = asClasses(t.cls).map(c => `<span class="cls-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>${esc(c)}</span>`).join("");
  const added = t.createdAt ? `<span class="added">${addedLabel(t.createdAt)}</span>` : "";
  const doneAt = (t.done && t.completedAt) ? `<span class="doneat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>${doneLabel(t.completedAt)}</span>` : "";
  const proj = t.project ? `<span class="proj-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l10-4 10 4-10 4z"/><path d="M2 7v10l10 4 10-4V7"/><path d="M12 11v10"/></svg>${esc(t.project)}</span>` : "";
  const notes = t.notes ? `<div class="t-notes">${esc(t.notes)}</div>` : "";
  return `<div class="task ${t.done?"done":""}" style="--rail:${urgency(t)}">
    <button class="check" data-toggle="${t.id}" aria-label="Toggle done">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>
    </button>
    <div class="t-main">
      <div class="t-title">${esc(t.title)}</div>
      <div class="t-meta">${who}${proj}${clsTag}${due}${doneAt}${added}</div>
      ${notes}
    </div>
    <div class="t-actions">
      <button class="icon-btn" data-edit="${t.id}" aria-label="Edit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </button>
      <button class="icon-btn" data-copy="${t.id}" aria-label="Duplicate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button class="icon-btn del" data-del="${t.id}" aria-label="Delete">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
      </button>
    </div>
  </div>`;
}

/* ---------- modal ---------- */
function openModal(t, asCopy) {
  const editing = !!t && !asCopy;          // copy mode prefills but creates a NEW task
  editingId = editing ? t.id : null;
  $("#modalTitle").textContent = editing ? "Edit task" : asCopy ? "Duplicate task" : "Add task";
  $("#saveBtn").textContent = editing ? "Save changes" : "Add task";
  $("#f-title").value = t ? t.title : "";
  $("#f-who").value = t ? (t.who||"") : (personFilter || ME);
  setSelectedClasses(t ? asClasses(t.cls) : []);
  $("#f-project").value = t ? (t.project||"") : "";
  $("#f-due").value = t ? (t.due||"") : "";
  $("#f-notes").value = t ? (t.notes||"") : "";
  $("#scrim").classList.add("open");
  setTimeout(()=>$("#f-title").focus(), 60);
}
function closeModal() { $("#scrim").classList.remove("open"); editingId = null; }

async function saveTask() {
  const title = $("#f-title").value.trim();
  if (!title) { $("#f-title").focus(); return; }
  const data = { title, who: $("#f-who").value.trim(), cls: getSelectedClasses(), project: $("#f-project").value.trim(), due: $("#f-due").value || "", notes: $("#f-notes").value.trim() };
  const btn = $("#saveBtn"); const label = btn.textContent;
  btn.disabled = true; btn.textContent = "Saving…";
  try {
    if (editingId) {
      const updated = await apiUpdate(editingId, data);
      const i = tasks.findIndex(x=>x.id===editingId); if (i>-1) tasks[i] = updated;
    } else {
      const created = await apiCreate(data);
      tasks.push(created);
    }
    closeModal(); render();
  } catch (e) {
    alert("Couldn't save — make sure the server is running.");
  } finally {
    btn.disabled = false; btn.textContent = label;
  }
}

/* ---------- events ---------- */
$("#openAdd").onclick = () => openModal(null);

function setView(v) {
  view = v;
  $("#tasksView").hidden = (v !== "tasks");
  $("#dashboard").hidden = (v !== "dashboard");
  [...$("#tabs").children].forEach(b => b.setAttribute("aria-pressed", b.dataset.view === v));
  if (v === "dashboard") renderDashboard();
}
$("#tabs").addEventListener("click", e => {
  const b = e.target.closest("button"); if (b) setView(b.dataset.view);
});
$("#dashboard").addEventListener("click", e => {
  const m = e.target.closest("[data-edit]");
  if (m) { const t = tasks.find(x=>x.id===m.dataset.edit); if (t) openModal(t); }
});
$("#cancelBtn").onclick = closeModal;
$("#saveBtn").onclick = saveTask;
$("#f-class").addEventListener("click", e => {
  const b = e.target.closest(".chip-opt"); if (b) b.classList.toggle("on");
});
$("#scrim").addEventListener("click", e => { if (e.target.id === "scrim") closeModal(); });
$("#f-title").addEventListener("keydown", e => { if (e.key==="Enter") saveTask(); });
document.addEventListener("keydown", e => { if (e.key==="Escape") closeModal(); });

$("#weekToggle").onclick = () => {
  weekOnly = !weekOnly;
  if (weekOnly && archiveView) { archiveView = false; $("#archiveToggle").setAttribute("aria-pressed", false); }
  $("#weekToggle").setAttribute("aria-pressed", weekOnly);
  render();
};

$("#doneToggle").onclick = () => {
  hideDone = !hideDone;
  $("#doneToggle").setAttribute("aria-pressed", hideDone);
  $("#doneToggleLabel").textContent = hideDone ? "Show done" : "Hide done";
  render();
};

$("#archiveToggle").onclick = () => {
  archiveView = !archiveView;
  if (archiveView && weekOnly) { weekOnly = false; $("#weekToggle").setAttribute("aria-pressed", false); }
  $("#archiveToggle").setAttribute("aria-pressed", archiveView);
  render();
};

$("#sortSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  sortMode = b.dataset.sort;
  [...$("#sortSeg").children].forEach(x=>x.setAttribute("aria-pressed", x===b));
  render();
});

$("#filterRow").addEventListener("click", e => {
  const b = e.target.closest(".chip"); if (!b) return;
  personFilter = b.dataset.person === "" ? null : b.dataset.person;
  render();
});

list.addEventListener("click", async e => {
  const toggle = e.target.closest("[data-toggle]");
  const edit = e.target.closest("[data-edit]");
  const copy = e.target.closest("[data-copy]");
  const del = e.target.closest("[data-del]");
  if (toggle) {
    const t = tasks.find(x=>x.id===toggle.dataset.toggle);
    if (!t) return;
    const prevDone = t.done, prevCompleted = t.completedAt;
    const newDone = !t.done;
    t.done = newDone;
    t.completedAt = newDone ? Date.now() : null;   // optimistic, so "Done date" shows instantly
    render();
    try {
      const updated = await apiUpdate(t.id, { done: newDone });
      const i = tasks.findIndex(x=>x.id===t.id); if (i>-1) tasks[i] = updated;
      render();                                    // sync with the server's saved timestamp
    } catch (err) {
      t.done = prevDone; t.completedAt = prevCompleted; render();   // roll back
      alert("Couldn't update — is the server running?");
    }
  } else if (edit) {
    const t = tasks.find(x=>x.id===edit.dataset.edit); if (t) openModal(t);
  } else if (copy) {
    const t = tasks.find(x=>x.id===copy.dataset.copy); if (t) openModal(t, true);
  } else if (del) {
    const id = del.dataset.del;
    const t = tasks.find(x=>x.id===id);
    const label = t ? `"${t.title}"` : "this task";
    if (!confirm(`Delete ${label} permanently? This can't be undone.`)) return;
    const prev = tasks.slice();
    tasks = tasks.filter(x=>x.id!==id); render(); // optimistic
    try {
      await apiDelete(id);
    } catch (err) {
      tasks = prev; render();                   // roll back
      alert("Couldn't delete — is the server running?");
    }
  }
});

/* ---------- auth ---------- */
function showLogin() {
  $("#authScrim").hidden = false;
  $("#signoutBtn").hidden = true;
  $("#login-pass").disabled = false;
  setTimeout(() => $("#login-user").focus(), 60);
}
function hideLogin() {
  $("#authScrim").hidden = true;
  $("#login-pass").value = "";
  $("#login-pass").disabled = true;   // no active password field while using the app
}

async function doLogin() {
  const username = $("#login-user").value;
  const password = $("#login-pass").value;
  const err = $("#login-error");
  err.textContent = "";
  if (!username) { err.textContent = "Pick a user."; return; }
  const btn = $("#login-btn"); btn.disabled = true; btn.textContent = "Signing in…";
  try {
    const r = await fetch("/api/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password }) });
    if (!r.ok) { err.textContent = "Wrong user or password."; return; }
    const data = await r.json();
    startSession(data.name);
    $("#login-pass").value = "";
  } catch (e) {
    err.textContent = "Couldn't reach the server.";
  } finally {
    btn.disabled = false; btn.textContent = "Sign in";
  }
}

async function doLogout() {
  try { await fetch("/api/logout", { method: "POST" }); } catch (e) {}
  ME = "";
  showLogin();
}

function startSession(name) {
  ME = name;
  $("#whoami").textContent = name;
  $("#signoutBtn").hidden = false;
  hideLogin();
  load();
}

$("#login-btn").onclick = doLogin;
$("#login-pass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
$("#signoutBtn").onclick = doLogout;

async function init() {
  try {
    const r = await fetch("/api/me");
    if (r.ok) { const data = await r.json(); startSession(data.name); }
    else showLogin();
  } catch (e) { showLogin(); }
}

init();
</script>
